name: Build and Deploy

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io

jobs:
  filter:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.changes.outputs.backend }}
      frontend: ${{ steps.changes.outputs.frontend }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'proto/**'
              - '.github/workflows/deploy.yml'
            frontend:
              - 'frontend/**'
              - 'proto/**'
              - '.github/workflows/deploy.yml'

  build-backend:
    needs: filter
    if: ${{ needs.filter.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: backend/go.sum

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/execution_engine/package-lock.json

      - name: Cache Go Binaries
        uses: actions/cache@v4
        with:
          path: ~/go/bin
          key: ${{ runner.os }}-go-bin-${{ hashFiles('backend/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-bin-

      - name: Install Tools
        run: |
          if [ ! -f ~/go/bin/oapi-codegen ] || [ ! -f ~/go/bin/protoc-gen-go ]; then
            go install github.com/deepmap/oapi-codegen/v2/cmd/oapi-codegen@v2.1.0
            go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.34.1
          fi
          echo "~/go/bin" >> $GITHUB_PATH

      - name: Setup Buf
        uses: bufbuild/buf-setup-action@v1
        with:
          version: "1.32.1"

      - name: Generate and Build
        run: |
          cd backend
          go generate ./...
          CGO_ENABLED=0 go build -o ../main ./cmd/api

      - name: Build execution engine
        run: |
          cd backend/execution_engine
          npm ci --omit=dev

      - name: Remove .dockerignore
        run: rm .dockerignore

      - name: Lowercase repository owner
        run: |
          echo "OWNER_LOWER=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./
          file: ./backend/Dockerfile.prod
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER_LOWER }}/my-budget-script-backend:latest
          build-args: |
            GIT_COMMIT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    needs: filter
    if: ${{ needs.filter.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Buf
        uses: bufbuild/buf-setup-action@v1
        with:
          version: "1.32.1"

      - name: Build Frontend
        run: |
          cd frontend
          npm ci
          VITE_GIT_COMMIT=${{ github.sha }} npm run build

      - name: Prepare production node_modules
        run: |
          cd frontend
          npm prune --omit=dev

      - name: Remove .dockerignore
        run: rm .dockerignore

      - name: Lowercase repository owner
        run: |
          echo "OWNER_LOWER=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./
          file: ./frontend/Dockerfile.prod
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER_LOWER }}/my-budget-script-frontend:latest
          build-args: |
            GIT_COMMIT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
