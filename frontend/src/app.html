<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="text-scale" content="scale" />
        <title>BudgetScript — Premium Personal Finance &amp; Budget Planning</title>
        <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
        <script>
            // Inline dark mode initialization to prevent white flash
            try {
                if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
            } catch (_) {}
        </script>
        <script>
            window.onerror = function (msg, url, line, col, error) {
                console.log("ROOT ERROR:", msg, "at", url, ":", line, ":", col);
                if (error) console.log("ERROR OBJ:", error);
            };
        </script>
        %sveltekit.head%
    </head>
    <body data-sveltekit-preload-data="hover">
        <script>
            console.log("HTML BODY BOOTING...");
        </script>
        <div style="display: contents">%sveltekit.body%</div>
    </body>
</html>
