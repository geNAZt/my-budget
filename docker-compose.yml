version: "3.8"

services:
  tunnel:
    image: cloudflare/cloudflared:latest
    restart: always
    command: tunnel --config /etc/cloudflared/config.yaml run
    volumes:
      - ./cloudflare-tunnel.yaml:/etc/cloudflared/config.yaml:Z
      - ./tunnel-credentials.json:/etc/cloudflared/credentials.json:Z
    depends_on:
      - backend
      - frontend

  backend:
    build:
      context: ./
      dockerfile: backend/Dockerfile
    expose:
      - "8080"
    volumes:
      - ./data:/app/data:Z
      - ./logs:/app/logs:Z
      - /var/run/docker.sock:/var/run/docker.sock

    develop:
      watch:
        - action: rebuild
          path: ./backend
    environment:
      - PORT=8080
      - DATABASE_URL=postgres://budget:budgetpass@db:5432/budget?sslmode=disable
      - RP_ID=${DOMAIN:-localhost}
      - RP_ORIGINS=https://${DOMAIN:-localhost},http://localhost:3000,http://${DOMAIN:-localhost}:3000
      - RESET_RECOVERY=${RESET_RECOVERY:-false}
    restart: always
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=budget
      - POSTGRES_PASSWORD=budgetpass
      - POSTGRES_DB=budget
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  frontend:
    build:
      context: ./
      dockerfile: frontend/Dockerfile
    expose:
      - "3000"
    develop:
      watch:
        - action: rebuild
          path: ./frontend
    restart: always

volumes:
  db-data:
