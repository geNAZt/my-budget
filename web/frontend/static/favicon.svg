<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="50%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Base background rounded square -->
  <rect width="64" height="64" rx="16" fill="url(#bg)" stroke="#334155" stroke-width="1.5" />
  
  <!-- Sleek dynamic ribbon or growth curve -->
  <path d="M16 44 L26 34 L36 38 L48 22" fill="none" stroke="url(#accent)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" />
  
  <!-- Circular node on the peak -->
  <circle cx="48" cy="22" r="4.5" fill="#ffffff" filter="url(#glow)" />
  <circle cx="48" cy="22" r="2.5" fill="#10b981" />
</svg>
