syntax = "proto3";

package execution;
option go_package = "github.com/genazt/my-budget-script/web/backend/internal/service/proto;executionpb";

service ExecutionEngine {
  rpc Ping(PingRequest) returns (PingResponse);
  rpc Execute(ExecuteRequest) returns (ExecuteResponse);
}

message PingRequest {}
message PingResponse {
  string status = 1;
}

message ExecuteRequest {
  string correlation_id = 1;
  string plan_id = 2;
  string code = 3;
  string code_hash = 4;
  bytes state_json = 5;
  map<string, string> secrets = 6;
  
  message Trigger {
    string type = 1;
    bytes data_json = 2;
  }
  Trigger trigger = 7;
}

message ExecuteResponse {
  string correlation_id = 1;
  bool success = 2;
  string stdout = 3;
  string stderr = 4;
  int32 exit_code = 5;
}

message RpcRequest {
  string correlation_id = 1;
  string msg_id = 2;
  string method = 3;
  bytes params_json = 4;
}

message RpcResponse {
  string correlation_id = 1;
  string msg_id = 2;
  bool success = 3;
  bytes result_json = 4;
  string error = 5;
}

message StdioFrame {
  oneof message {
    ExecuteRequest execute_request = 1;
    ExecuteResponse execute_response = 2;
    RpcRequest rpc_request = 3;
    RpcResponse rpc_response = 4;
    PingRequest ping_request = 5;
    PingResponse ping_response = 6;
  }
}
